{% extends "layout.html" %}

{% block title %}Profile{% endblock %}

{% block main %}
<div class="profile-wrap">
<div class="login-container animate__animated animate__fadeIn" style="width: 400px;">

    <h1 class="logo-badge text-whitesmoke">
        <span class="fa fa-user-circle"></span>
    </h1>

    <h3 class="text-whitesmoke">{{ user.username }}</h3>
    <p class="text-whitesmoke">{{ user.email }}</p>

    <hr style="border-color: rgba(255,255,255,0.1); margin: 20px 0;">

    <div style="display: flex; justify-content: center; gap: 40px; margin-bottom: 20px;">

        <div style="text-align: center;">
            <p style="font-size: 28px; font-weight: bold; color:  rgba(130, 0, 219, 0.7); margin: 0;">
                {{ msg_count }}
            </p>
            <p style="font-size: 12px; color: #aaa; margin: 0;">Messages Sent</p>
        </div>

        <div style="text-align: center;">
            <p style="font-size: 28px; font-weight: bold; color:  rgba(130, 0, 219, 0.7); margin: 0;">
                {{ user.created_at.split(" ")[0] if user.created_at else "N/A" }}
            </p>
            <p style="font-size: 12px; color: #aaa; margin: 0;">Date Joined</p>
        </div>

    </div>

    <a href="/" class="form-button button-l"
        style="display: block; text-align: center; padding: 12px; margin-top: 10px;
               background:  rgba(130, 0, 219, 0.7); color: white; font-weight: bold; border-radius: 8px;
               text-decoration: none;">
        Back to Chat
    </a>

</div>
</div>
{% endblock %}
