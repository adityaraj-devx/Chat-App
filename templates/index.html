{% extends "layout.html" %}

{% block main %}
<div class="chat-wrap">
<div class="chat-wrapper">
    <div class="chat-container">

        <div class="chat-box" id="chat-box">

            {% for msg in messages %}
            <div class="message-row {% if msg.user_id == session.user_id %}my-row{% else %}other-row{% endif %}">

                <div class="message-bubble">

                    <div class="msg-text">
                        {{ msg.message }}
                    </div>

                    <div class="msg-meta">
                        {% if msg.user_id != session.user_id %}
                        {{ msg.username }} •
                        {% endif %}
                        {{ msg.timestamp.split(" ")[1] }}
                    </div>

                    {% if msg.user_id == session.user_id %}
                    <div class="msg-actions">
                        <a href="/messages/{{ msg.id }}">✏️</a>
                        <form action="/messages/{{ msg.id }}/delete" method="post" class="delete-form">
                            <button class="delete-btn">✖</button>
                        </form>
                    </div>
                    {% endif %}

                </div>

            </div>
            {% endfor %}

        </div>

        <form action="/messages" method="post" class="chat-input">
            <input type="text" name="message" autocomplete="off" placeholder="Type a message..." required>
            <button type="submit" style="color: white;"><span>
                <i class="fa-solid fa-paper-plane"></i>
            </span> Send</button>
        </form>

    </div>
</div>
</div>

<script>
window.onload = function () {
    let box = document.getElementById("chat-box");
    if (box) {
        box.scrollTop = box.scrollHeight;
    }
};
</script>

{% endblock %}
