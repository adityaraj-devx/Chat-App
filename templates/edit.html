{% extends "layout.html" %}

{% block main %}
<div class="main-container">

    <div class="card">
        <h3>Edit Message</h3>

        <form method="post">
            <input type="text" name="message" value="{{ msg.message }}" class="form-control" required>

            <button type="submit" class="form-button">Update</button>
        </form>

        <br>
        <a href="/">Cancel</a>
    </div>

</div>
{% endblock %}
